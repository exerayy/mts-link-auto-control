<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTS-Link Auto Control</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="12" r="10" stroke="#1a73e8" stroke-width="2" fill="#e8f0fe"/>
                <path d="M8 12l3 3 5-5" stroke="#1a73e8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <div class="header-text">
            <h1>MTS-Link</h1>
            <p class="subtitle">Auto Control</p>
        </div>
        <div class="theme-switch-wrapper">
            <svg class="theme-icon-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"/>
                <line x1="12" y1="1" x2="12" y2="3"/>
                <line x1="12" y1="21" x2="12" y2="23"/>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                <line x1="1" y1="12" x2="3" y2="12"/>
                <line x1="21" y1="12" x2="23" y2="12"/>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <label class="switch theme-slider">
                <input type="checkbox" id="themeToggle">
                <span class="slider round"></span>
            </label>
            <svg class="theme-icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
        </div>
    </div>

    <div class="status-card">
        <div class="status-indicator active" id="statusIndicator"></div>
        <div class="status-info">
            <span class="status-label">Статус</span>
            <span class="status-value" id="statusText">Загрузка...</span>
            <span class="event-name" id="eventName" title="">—</span>
        </div>
        <div class="stats-badge" id="confirmBadge">0</div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="settings">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
            Настройки
        </button>
        <button class="tab-btn" data-tab="history">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="8" y1="6" x2="21" y2="6"/>
                <line x1="8" y1="12" x2="21" y2="12"/>
                <line x1="8" y1="18" x2="21" y2="18"/>
                <line x1="3" y1="6" x2="3.01" y2="6"/>
                <line x1="3" y1="12" x2="3.01" y2="12"/>
                <line x1="3" y1="18" x2="3.01" y2="18"/>
            </svg>
            История
        </button>
    </div>

    <div class="tab-content active" id="settingsTab">
        <div class="setting-group">
            <div class="setting-header">
                <span class="setting-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12 6 12 12 16 14"/>
                    </svg>
                </span>
                <h3>Интервал проверки</h3>
            </div>
            <div class="interval-control">
                <input type="number" id="intervalInput" min="1" max="3600" value="40">
                <span class="unit">секунд</span>
                <button id="saveIntervalBtn" class="btn btn-primary">Применить</button>
            </div>
        </div>

        <div class="setting-group">
            <div class="setting-header">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="8.5" cy="7" r="4"/>
                    <polyline points="17 11 19 13 23 9"/>
                </svg>
                <h3>Параметры присутствия</h3>
            </div>
            <div class="toggle-row">
                <label class="switch">
                    <input type="checkbox" id="modifyBodyToggle">
                    <span class="slider"></span>
                </label>
                <span class="toggle-label">Модифицировать параметры</span>
            </div>
            <div id="bodyParams" class="params-list" style="display: none;">
                <label class="param-item">
                    <input type="checkbox" id="isFocused" checked>
                    <span class="param-name">Фокус окна</span>
                    <span class="param-badge">isFocused</span>
                </label>
                <label class="param-item">
                    <input type="checkbox" id="isSoundEnabled" checked>
                    <span class="param-name">Звук</span>
                    <span class="param-badge">isSoundEnabled</span>
                </label>
                <label class="param-item">
                    <input type="checkbox" id="isVideoEnabled" checked>
                    <span class="param-name">Видео</span>
                    <span class="param-badge">isVideoEnabled</span>
                </label>
            </div>
        </div>
    </div>

    <div class="tab-content" id="historyTab" style="display: none;">
        <div class="history-header">
            <span>Последние действия</span>
            <button id="clearBtn" class="btn btn-clear">Очистить</button>
        </div>
        <div id="historyList" class="history-list">
            <p class="empty-message">Нет записей</p>
        </div>
    </div>

    <div class="footer">
        <span>v1.0</span>
        <span>github.com/exerayy</span>
    </div>
</div>
<script src="popup.js"></script>
</body>
</html>
